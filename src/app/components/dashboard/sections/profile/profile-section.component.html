<div class="section-shell">
  <form [formGroup]="profileForm" (ngSubmit)="submitForm.emit()" class="form-container">
    <div class="section-header">
      <h2>Edit Profile</h2>
      <div class="profile-top-actions">
        <button *ngIf="!isEditing" type="button" class="btn btn-primary" (click)="startEdit.emit()" [disabled]="loading">
          Edit Profile
        </button>
        <button *ngIf="isEditing" type="submit" class="btn btn-primary" [disabled]="loading">
          {{ loading ? 'Saving...' : 'Save Profile' }}
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancel.emit()" [disabled]="loading">
          {{ isEditing ? 'Cancel' : 'Back' }}
        </button>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-section">
        <h3>Personal Information</h3>

        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input type="text" id="name" formControlName="name" class="form-control" placeholder="Your full name">
          <div *ngIf="profileForm.get('name')?.touched && profileForm.get('name')?.hasError('required')" class="error-message">
            Name is required
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email ID <span class="required">*</span></label>
          <input type="email" id="email" formControlName="email" class="form-control" placeholder="Your email">
          <div *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.hasError('required')" class="error-message">
            Email is required
          </div>
          <div *ngIf="profileForm.get('email')?.touched && profileForm.get('email')?.hasError('email')" class="error-message">
            Please enter a valid email
          </div>
        </div>

        <div class="form-group">
          <label for="ekda">Ekda</label>
          <select id="ekda" formControlName="ekda" class="form-control">
            <option value="">Select membership type</option>
            <option value="Life Member">Life Member</option>
            <option value="Associate Member">Associate Member</option>
            <option value="Corporate Member">Corporate Member</option>
          </select>
        </div>

        <div class="form-group">
          <label for="whatsapp">WhatsApp Number <span class="required">*</span></label>
          <input type="text" id="whatsapp" formControlName="whatsappNumber" class="form-control" placeholder="10-digit number">
          <div *ngIf="profileForm.get('whatsappNumber')?.touched && profileForm.get('whatsappNumber')?.hasError('pattern')" class="error-message">
            Please enter a valid 10-digit number
          </div>
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" formControlName="dateOfBirth" class="form-control">
        </div>
      </div>

      <div class="form-section">
        <h3>Company Information</h3>

        <div class="form-group">
          <label for="company">Company Name</label>
          <input type="text" id="company" formControlName="companyName" class="form-control" placeholder="Your company">
        </div>

        <div class="form-group">
          <label for="industry">Industry</label>
          <textarea id="industry" formControlName="industry" class="form-control" placeholder="e.g. IT, Finance" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="working">Working Since (Year)</label>
          <input type="number" id="working" formControlName="workingSince" class="form-control" placeholder="Year">
        </div>

        <div class="form-group">
          <label for="areas">Areas of Interest</label>
          <textarea id="areas" formControlName="areasOfInterest" class="form-control" placeholder="e.g. Music, Travel" rows="2"></textarea>
        </div>

        <div class="form-group">
          <label for="business">Business Profile</label>
          <textarea id="business" formControlName="businessProfile" class="form-control" placeholder="Your business description" rows="3"></textarea>
        </div>
      </div>

      <div class="form-section">
        <h3>Online Presence</h3>

        <div class="form-group">
          <label for="linkedin">LinkedIn Profile</label>
          <input type="url" id="linkedin" formControlName="linkedinProfile" class="form-control" placeholder="https://linkedin.com/...">
        </div>

        <div class="form-group">
          <label for="website">Website / Online Store</label>
          <input type="url" id="website" formControlName="website" class="form-control" placeholder="https://...">
        </div>
      </div>
    </div>
  </form>
</div>
