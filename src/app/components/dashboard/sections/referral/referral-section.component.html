<div class="section-shell">
  <h2>Upload Referral</h2>
  <form [formGroup]="referralForm" (ngSubmit)="submitForm.emit()" class="form-container">
    <div class="form-section">
      <div class="form-group">
        <label for="memberSearch">Member Search <span class="required">*</span></label>
        <select id="memberSearch" formControlName="memberSearch" class="form-control">
          <option value="">Select member</option>
          <option *ngFor="let member of memberOptions" [value]="member.name">{{ member.name }}</option>
        </select>
        <div class="error-message" *ngIf="referralForm.get('memberSearch')?.touched && referralForm.get('memberSearch')?.hasError('required')">
          Please select a valid member from search list
        </div>
      </div>

      <div class="form-group">
        <label for="referralType">Referral Type <span class="required">*</span></label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" formControlName="referralType" value="inside">
            Inside
          </label>
          <label class="radio-label">
            <input type="radio" formControlName="referralType" value="outside">
            Outside
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="refName">Referral Name <span class="required">*</span></label>
        <input type="text" id="refName" formControlName="referrerName" class="form-control" placeholder="Referral full name">
        <div class="error-message" *ngIf="referralForm.get('referrerName')?.touched && referralForm.get('referrerName')?.hasError('required')">
          Referral name is required
        </div>
      </div>

      <div class="form-group">
        <label for="refContact">Referral Contact Number <span class="required">*</span></label>
        <input type="text" id="refContact" formControlName="referrerContact" class="form-control" placeholder="10-digit number">
        <div class="error-message" *ngIf="referralForm.get('referrerContact')?.touched && referralForm.get('referrerContact')?.hasError('pattern')">
          Please enter a valid 10-digit number
        </div>
      </div>

      <div class="form-group">
        <label for="refRemarks">Remarks / About Referral</label>
        <textarea id="refRemarks" formControlName="remarks" class="form-control" placeholder="Add remarks about this referral" rows="4"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Submitting...' : 'Submit Referral' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel.emit()">Cancel</button>
    </div>
  </form>
</div>
