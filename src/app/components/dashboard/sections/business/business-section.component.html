<div class="section-shell">
  <h2>Upload Done Business</h2>
  <form [formGroup]="businessForm" (ngSubmit)="submitForm.emit()" class="form-container">
    <div class="form-section">
      <div class="form-group">
        <label for="memberSearchBiz">Member Search <span class="required">*</span></label>
        <select id="memberSearchBiz" formControlName="memberName" class="form-control">
          <option value="">Select member</option>
          <option *ngFor="let member of memberOptions" [value]="member.name">{{ member.name }}</option>
        </select>
        <div class="error-message" *ngIf="businessForm.get('memberName')?.touched && businessForm.get('memberName')?.hasError('required')">
          Please select a valid member from search list
        </div>
      </div>

      <div class="form-group">
        <label for="amountClosed">Amount Closed <span class="required">*</span></label>
        <input type="number" id="amountClosed" formControlName="amountClosed" class="form-control" placeholder="Enter closed amount">
        <div class="error-message" *ngIf="businessForm.get('amountClosed')?.touched && businessForm.get('amountClosed')?.hasError('required')">
          Amount is required
        </div>
        <div class="error-message" *ngIf="businessForm.get('amountClosed')?.touched && businessForm.get('amountClosed')?.hasError('min')">
          Amount must be greater than 0
        </div>
      </div>

      <div class="form-group">
        <label for="bizRemark">Remark <span class="required">*</span></label>
        <textarea id="bizRemark" formControlName="remark" class="form-control" placeholder="Add remark about done business" rows="4"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading">
        {{ loading ? 'Submitting...' : 'Submit Done Business' }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel.emit()">Cancel</button>
    </div>
  </form>
</div>
